# =============================================================================
# keyword_registry.yaml
# 仅声明：关键字映射 / format / unit / section / handler
# =============================================================================

petrel:
  sections: [RUNSPEC, GRID, EDIT, PROPS, REGIONS, SOLUTION, SUMMARY, SCHEDULE]
  unit_flags: [FIELD, METRIC, LAB, SI]

  keywords:
    OIL:     {format: flag, json: {section: meta, key: fluid_oil}, value: true}
    WATER:   {format: flag, json: {section: meta, key: fluid_water}, value: true}
    GAS:     {format: flag, json: {section: meta, key: fluid_gas}, value: true}
    DISGAS:  {format: flag, json: {section: meta, key: fluid_disgas}, value: true}
    RADIAL:  {format: flag, json: {section: grid, key: grid_type}, value: RADIAL}
    MISCIBLE: {format: custom, handler: _parse_miscible}

    TITLE:     {format: custom, handler: _parse_title}
    WELLDIMS:  {format: skip_slash}
    TABDIMS:   {format: skip_slash}
    EQLDIMS:   {format: skip_slash}
    AQUDIMS:   {format: skip_slash}
    REGDIMS:   {format: skip_slash}
    VFPPDIMS:  {format: skip_slash}
    GRUPDIMS:  {format: skip_slash}
    PIMTDIMS:  {format: skip_slash}
    NUPCOL:    {format: skip_slash}
    NUPCOIL:   {format: skip_slash}
    NSTACK:    {format: skip_slash}
    TUNING:    {format: custom, handler: _parse_tuning}
    DRSDT:     {format: skip_slash}
    RPTSCHED:  {format: skip_slash}
    RPTGRID:   {format: skip_slash}
    RPTPROPS:  {format: skip_slash}
    RPTSOL:    {format: skip_slash}
    RPTSUM:    {format: skip_slash}
    RPTSMRY:   {format: skip_slash}
    RPTRST:    {format: skip_slash}
    IMPES:     {format: skip_slash}
    DEBUG:     {format: skip_slash}
    COLUMNS:   {format: skip_slash}
    SAVE:      {format: skip_slash}
    RUNSUM:    {format: skip_slash}
    WGOR:      {format: skip_slash}
    WBHP:      {format: skip_slash}
    WOPR:      {format: skip_slash}
    WWPR:      {format: skip_slash}
    WGPR:      {format: skip_slash}
    WOIR:      {format: skip_slash}
    WWIR:      {format: skip_slash}
    WGIR:      {format: skip_slash}
    BGSAT:     {format: skip_slash}
    BOSAT:     {format: skip_slash}
    FOPR:      {format: skip_slash}
    BPR:       {format: skip_slash}

    DIMENS:  {format: dimens}

    DX:      {format: array,  json: {section: grid, key: di},       unit: ft}
    DY:      {format: array,  json: {section: grid, key: dj},       unit: ft}
    DZ:      {format: array,  json: {section: grid, key: dk},       unit: ft}
    DRV:     {format: array,  json: {section: grid, key: drv},      unit: ft}
    DTHETA:  {format: array,  json: {section: grid, key: dtheta},   unit: deg}
    TOPS:    {format: array,  json: {section: grid, key: tops_ref}, unit: ft}
    INRAD:   {format: scalar, json: {section: grid, key: inrad},    unit: ft}

    PORO:    {format: array, json: {section: reservoir, key: porosity}, unit: fraction}
    PERMX:   {format: array, json: {section: reservoir, key: perm_i},   unit: md}
    PERMY:   {format: array, json: {section: reservoir, key: perm_j},   unit: md}
    PERMZ:   {format: array, json: {section: reservoir, key: perm_k},   unit: md}
    PERMR:   {format: array, json: {section: reservoir, key: perm_i},   unit: md}
    NTG:     {format: array, json: {section: reservoir, key: ntg},      unit: fraction}

    EQUALS:   {format: custom, handler: _parse_equals}
    COPY:     {format: custom, handler: _parse_copy}
    MULTIPLY: {format: custom, handler: _parse_multiply}

    PVTO:    {format: custom, handler: _parse_pvto}
    PVDG:    {format: custom, handler: _parse_pvdg}
    PVDO:    {format: table,  json: {section: fluid, key: pvdo_table}, columns: [p, bo, viso], ncols: 3}
    PVTW:    {format: custom, handler: _parse_pvtw}
    DENSITY: {format: custom, handler: _parse_density}
    ROCK:    {format: custom, handler: _parse_rock}
    SDENSITY: {format: scalar, json: {section: fluid, key: solvent_density}, unit: "lb/ft3"}
    TLMIXPAR: {format: scalar, json: {section: fluid, key: tlmixpar}, unit: ""}

    SWOF:    {format: table, json: {section: rockfluid, key: swof_table}, columns: [sw, krw, krow, pcow], ncols: 4}
    SGOF:    {format: table, json: {section: rockfluid, key: sgof_table}, columns: [sg, krg, krog, pcog], ncols: 4}
    SWFN:    {format: table, json: {section: rockfluid, key: swfn_table}, columns: [sw, krw, pcow], ncols: 3}
    SGFN:    {format: table, json: {section: rockfluid, key: sgfn_table}, columns: [sg, krg, pcog], ncols: 3}
    SOF3:    {format: table, json: {section: rockfluid, key: sof3_table}, columns: [so, krow, krog], ncols: 3}
    SOF2:    {format: table, json: {section: rockfluid, key: sof2_table}, columns: [so, krog], ncols: 2}

    EQUIL:   {format: custom, handler: _parse_equil}
    RSVD:    {format: custom, handler: _parse_rsvd}

    START:   {format: custom, handler: _parse_start}
    TSTEP:   {format: custom, handler: _parse_tstep}
    DATES:   {format: custom, handler: _parse_dates}

    WELSPECS: {format: custom, handler: _parse_welspecs}
    COMPDAT:  {format: custom, handler: _parse_compdat}
    WCONPROD: {format: custom, handler: _parse_wconprod}
    WCONINJE: {format: custom, handler: _parse_wconinje}
    WELTARG:  {format: custom, handler: _parse_weltarg}

cmg:
  ignore_keywords:
    - "*VERTICAL"
    - "*BLOCK_CENTER"
    - "*WATER_OIL_GAS"
    - "*USER_INPUT"
    - "*ROCKFLUID"
    - "*NUMERICAL"
    - "*INITIAL"
    - "*RUN"
    - "*STOP"
    - "*RESULTS"
    - "*SIMULATOR"
    - "*TITLE1"
    - "*TITLE2"
    - "*TITLE3"
    - "*WPRN"
    - "*OUTPRN"
    - "*WSRF"
    - "*OUTSRF"

  keywords:
    "*INUNIT":    {format: custom, handler: _parse_inunit}

    "*GRID":      {format: grid_header}
    "*DI":        {format: array, json: {section: grid, key: di}, unit: ft}
    "*DJ":        {format: array, json: {section: grid, key: dj}, unit: ft}
    "*DK":        {format: array, json: {section: grid, key: dk}, unit: ft}
    "*DEPTH":     {format: depth}
    "*KDIR":      {format: custom, handler: _parse_kdir}

    "*POR":       {format: array, json: {section: reservoir, key: porosity}, unit: fraction}
    "*PERMI":     {format: array, json: {section: reservoir, key: perm_i},   unit: md}
    "*PERMJ":     {format: array, json: {section: reservoir, key: perm_j},   unit: md}
    "*PERMK":     {format: array, json: {section: reservoir, key: perm_k},   unit: md}
    "*CPOR":      {format: scalar_inline, json: {section: reservoir, key: rock_compressibility}, unit: "1/psi"}
    "*PRPOR":     {format: scalar_inline, json: {section: reservoir, key: rock_ref_pressure},    unit: psia}

    "*PVT":       {format: pvt6}
    "*PVTS":      {format: table, json: {section: fluid, key: pvts_table}, columns: [p, rss, es, viss, omega_s], ncols: 5}
    "*MODEL":     {format: custom, handler: _parse_model}
    "*DENSITY":   {format: density_typed}
    "*BWI":       {format: scalar_inline, json: {section: fluid, key: water_fvf}, unit: "RB/STB"}
    "*CW":        {format: scalar_inline, json: {section: fluid, key: water_compressibility}, unit: "1/psi"}
    "*REFPW":     {format: scalar_inline, json: {section: fluid, key: water_ref_pressure}, unit: psia}
    "*VWI":       {format: scalar_inline, json: {section: fluid, key: water_viscosity}, unit: cp}
    "*CVW":       {format: scalar_inline, json: {section: fluid, key: water_viscosity_coeff}, unit: "1/psi"}
    "*CO":        {format: scalar_inline, json: {section: fluid, key: oil_compressibility}, unit: "1/psi"}
    "*CVO":       {format: scalar_inline, json: {section: fluid, key: oil_viscosity_coeff}, unit: "1/psi"}
    "*OMEGASG":   {format: scalar_inline, json: {section: fluid, key: omegasg}, unit: ""}
    "*MINSS":     {format: scalar_inline, json: {section: fluid, key: minss}, unit: "fraction"}

    "*RPT":       {format: skip_int}
    "*SWT":       {format: rpt_table, json: {section: rockfluid, key: swt_table}, columns: [sw, krw, krow, pcow]}
    "*SLT":       {format: rpt_table, json: {section: rockfluid, key: slt_table}, columns: [sl, krg, krog, pcog]}

    "*REFDEPTH":  {format: scalar_inline, json: {section: initial, key: ref_depth}, unit: ft}
    "*REFPRES":   {format: scalar_inline, json: {section: initial, key: ref_pressure}, unit: psia}
    "*DWOC":      {format: scalar_inline, json: {section: initial, key: woc_depth}, unit: ft}
    "*DGOC":      {format: scalar_inline, json: {section: initial, key: goc_depth}, unit: ft}
    "*PB":        {format: array, json: {section: initial, key: bubble_point_pressure}, unit: psia}
    "*PBS":       {format: array, json: {section: initial, key: solvent_bubble_point_pressure}, unit: psia}

    "*DTMAX":     {format: scalar_inline, json: {section: numerical, key: max_timestep}, unit: day}
    "*MAXSTEPS":  {format: scalar_inline, json: {section: numerical, key: max_steps}, unit: null}

    "*WELL":      {format: custom, handler: _parse_well}
    "*PRODUCER":  {format: custom, handler: _parse_producer}
    "*INJECTOR":  {format: custom, handler: _parse_injector}
    "*INCOMP":    {format: custom, handler: _parse_incomp}
    "*OPERATE":   {format: custom, handler: _parse_operate}
    "*PERF":      {format: custom, handler: _parse_perf}
    "*PERFV":     {format: custom, handler: _parse_perfv}
    "*GEOMETRY":  {format: custom, handler: _parse_geometry}
    "*ALTER":     {format: custom, handler: _parse_alter}
    "*TIME":      {format: custom, handler: _parse_time}
    "*DATE":      {format: custom, handler: _parse_date}
    "*DTWELL":    {format: scalar_inline, json: {section: meta, key: dtwell}, unit: day}

generators:
  cmg:
    grid:
      di:       {keyword: "*DI", format: array}
      dj:       {keyword: "*DJ", format: array}
      dk:       {keyword: "*DK", format: array}
      depth_ref_block: {keyword: "*DEPTH", format: depth_block}
      tops_ref: {keyword: null, format: depth_from_tops}

    reservoir:
      porosity:             {keyword: "*POR",   format: array}
      perm_i:               {keyword: "*PERMI", format: array}
      perm_j:               {keyword: "*PERMJ", format: array}
      perm_k:               {keyword: "*PERMK", format: array}
      rock_compressibility: {keyword: "*CPOR",  format: scalar_inline}
      rock_ref_pressure:    {keyword: "*PRPOR", format: scalar_inline}
      ntg:                  {keyword: "*NET2GROSS", format: array}

    fluid:
      pvt_table:             {keyword: "*PVT", format: pvt6}
      oil_density:           {keyword: "*DENSITY *OIL", format: scalar_inline}
      gas_density:           {keyword: "*DENSITY *GAS", format: scalar_inline}
      water_density:         {keyword: "*DENSITY *WATER", format: scalar_inline}
      solvent_density:       {keyword: "*DENSITY *SOLVENT", format: scalar_inline}
      water_fvf:             {keyword: "*BWI", format: scalar_inline}
      water_compressibility: {keyword: "*CW", format: scalar_inline}
      water_ref_pressure:    {keyword: "*REFPW", format: scalar_inline}
      water_viscosity:       {keyword: "*VWI", format: scalar_inline}
      water_viscosity_coeff: {keyword: "*CVW", format: scalar_inline}
      oil_compressibility:   {keyword: "*CO", format: scalar_inline}
      oil_viscosity_coeff:   {keyword: "*CVO", format: scalar_inline}
      omegasg:               {keyword: "*OMEGASG", format: scalar_inline}
      minss:                 {keyword: "*MINSS", format: scalar_inline}

    rockfluid:
      swt_table: {keyword: "*SWT", format: rpt_table}
      slt_table: {keyword: "*SLT", format: rpt_table}

    initial:
      ref_pressure:          {keyword: "*REFPRES", format: scalar_inline}
      ref_depth:             {keyword: "*REFDEPTH", format: scalar_inline}
      woc_depth:             {keyword: "*DWOC", format: scalar_inline}
      goc_depth:             {keyword: "*DGOC", format: scalar_inline}
      bubble_point_pressure: {keyword: "*PB", format: array}
      solvent_bubble_point_pressure: {keyword: "*PBS", format: array}

    numerical:
      max_timestep: {keyword: "*DTMAX", format: scalar_inline}
      max_steps:    {keyword: "*MAXSTEPS", format: scalar_inline}

  petrel:
    grid:
      di:       {keyword: DX, format: array}
      dj:       {keyword: DY, format: array}
      dk:       {keyword: DZ, format: array}
      tops_ref: {keyword: TOPS, format: array}

    reservoir:
      porosity: {keyword: PORO, format: array}
      perm_i:   {keyword: PERMX, format: array}
      perm_j:   {keyword: PERMY, format: array}
      perm_k:   {keyword: PERMZ, format: array}
