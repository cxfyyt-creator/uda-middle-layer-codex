# =============================================================================
# units.yaml
# 仅声明：纯数值换算规则
# =============================================================================

psi_to_bara:
  from_unit: psia
  to_unit: bara
  factor: 0.0689476
  formula: "value_bara = value_psia * 0.0689476"

bara_to_psi:
  from_unit: bara
  to_unit: psia
  factor: 14.5038
  formula: "value_psia = value_bara * 14.5038"

ft_to_m:
  from_unit: ft
  to_unit: m
  factor: 0.3048
  formula: "value_m = value_ft * 0.3048"

m_to_ft:
  from_unit: m
  to_unit: ft
  factor: 3.28084
  formula: "value_ft = value_m * 3.28084"

per_psi_to_per_bara:
  from_unit: "1/psi"
  to_unit: "1/bara"
  factor: 14.5038
  formula: "value_per_bara = value_per_psi * 14.5038"

per_bara_to_per_psi:
  from_unit: "1/bara"
  to_unit: "1/psi"
  factor: 0.0689476
  formula: "value_per_psi = value_per_bara * 0.0689476"

lbft3_to_kgm3:
  from_unit: "lb/ft3"
  to_unit: "kg/m3"
  factor: 16.0185
  formula: "value_kgm3 = value_lbft3 * 16.0185"

kgm3_to_lbft3:
  from_unit: "kg/m3"
  to_unit: "lb/ft3"
  factor: 0.062428
  formula: "value_lbft3 = value_kgm3 * 0.062428"

stbd_to_m3d:
  from_unit: "STB/d"
  to_unit: "m3/d"
  factor: 0.158987
  formula: "value_m3d = value_stbd * 0.158987"

m3d_to_stbd:
  from_unit: "m3/d"
  to_unit: "STB/d"
  factor: 6.28981
  formula: "value_stbd = value_m3d * 6.28981"

mscfd_to_m3d:
  from_unit: "Mscf/d"
  to_unit: "m3/d"
  factor: 28.3168
  formula: "value_m3d = value_mscfd * 28.3168"

m3d_to_mscfd:
  from_unit: "m3/d"
  to_unit: "Mscf/d"
  factor: 0.035315
  formula: "value_mscfd = value_m3d * 0.035315"

# Eclipse FIELD 内部列到 CMG FIELD 内部列

eclipse_rs_to_cmg_rs:
  from_unit: "Mscf/STB"
  to_unit: "scf/STB"
  factor: 1000.0
  formula: "rs_cmg = rs_eclipse * 1000.0"

eclipse_bg_to_cmg_eg:
  from_unit: "RB/Mscf"
  to_unit: "scf/RB"
  factor: null
  formula: "eg_cmg = 1000.0 / bg_eclipse"
